<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Checkout | AnthropicBots E-Commerce</title>

    <link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/hero.css">
<link rel="stylesheet" href="styles/product-card.css">
<link rel="stylesheet" href="styles/style.css">

    <link rel="stylesheet" href="styles/checkout.css">

    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >
</head>

<body>

    <div id="navbar"></div>

    <!-- Checkout Header -->

    <section id="checkout-header">

        <h2>Checkout</h2>

        <p>
            Complete your order securely
        </p>

    </section>

    <!-- Checkout Section -->

    <section id="checkout-page" class="section-p1">

        <!-- Billing Form -->

        <div class="checkout-form-container">

            <h2>Billing Information</h2>

            <form id="checkout-form">

                <div class="form-row">

                    <input
                        type="text"
                        id="full-name"
                        placeholder="Full Name"
                        required
                    >

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required
                    >

                </div>

                <div class="form-row">

                    <input
                        type="text"
                        id="phone"
                        placeholder="Phone Number"
                        required
                    >

                    <input
                        type="text"
                        id="city"
                        placeholder="City"
                        required
                    >

                </div>

                <div class="form-row">

                    <input
                        type="text"
                        id="state"
                        placeholder="State"
                        required
                    >

                    <input
                        type="text"
                        id="zip"
                        placeholder="ZIP Code"
                        required
                    >

                </div>

                <textarea
                    id="address"
                    placeholder="Full Address"
                    required
                ></textarea>

                <!-- Payment -->

                <h3>Payment Method</h3>

                <div class="payment-options">

                    <label>

                        <input
                            type="radio"
                            name="payment"
                            value="Card"
                            checked
                        >

                        Credit / Debit Card

                    </label>

                    <label>

                        <input
                            type="radio"
                            name="payment"
                            value="UPI"
                        >

                        UPI Payment

                    </label>

                    <label>

                        <input
                            type="radio"
                            name="payment"
                            value="COD"
                        >

                        Cash On Delivery

                    </label>

                </div>

                <!-- Card Info -->

                <div id="card-details">

                    <input
                        type="text"
                        id="card-number"
                        placeholder="Card Number"
                        required
                    >
                                
                    <div class="form-row">
                    
                        <input
                            type="text"
                            id="expiry"
                            placeholder="MM/YY"
                            required
                        >
                    
                        <input
                            type="text"
                            id="cvv"
                            placeholder="CVV"
                            required
                        >
                    
                    </div>
                
                </div>

                <button type="submit">

                    Place Order

                </button>

            </form>

        </div>

        <!-- Summary -->

        <div class="checkout-summary">

            <h2>Order Summary</h2>

            <div id="checkout-items"></div>

            <div class="summary-row">

                <span>Subtotal</span>

                <span id="checkout-subtotal">
                    ₹0
                </span>

            </div>

            <div class="summary-row">

                <span>Tax (18%)</span>

                <span id="checkout-tax">
                    ₹0
                </span>

            </div>

            <div class="summary-row">

                <span>Shipping</span>

                <span id="checkout-shipping">
                
                    Free
                
                </span>
            
            </div>

            <div class="summary-row total">
            
                <span>Total</span>
            
                <span id="checkout-total">
                    ₹0
                </span>
            
            </div>

        </div>

    </section>

    <div id="footer"></div>

    <!-- Firebase -->

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script src="scripts/components.js"></script>

    <script src="scripts/auth.js"></script>

    <script src="scripts/checkout.js"></script>

</body>
</html>
