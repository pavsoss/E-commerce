<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Order Success | AnthropicBots E-Commerce</title>

    <link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/hero.css">
<link rel="stylesheet" href="styles/product-card.css">
<link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/success.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" >
</head>
<body>
    <div id="navbar"></div>

    <!-- Success Section -->
    <section id="success-page">
        <div class="success-box">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h2>Order Placed Successfully!</h2>
            <p>
                Thank you for shopping with
                AnthropicBots E-Commerce.
            </p>
            <div class="order-info">
                <p>
                    <strong>Order ID:</strong>
                    <span id="order-id">
                        ORD-0000
                    </span>
                </p>
                <p>
                    <strong>Date:</strong>
                    <span id="order-date"></span>
                </p>
                <p>
                    <strong>Status:</strong>
                    <span class="success-status">
                        Confirmed
                    </span>
                </p>
            </div>
            <div class="success-buttons">
                <a href="shop.html">
                    Continue Shopping
                </a>
                <a href="dashboard.html#orders">
                    View Orders
                </a>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/success.js"></script>

</body>
</html>
